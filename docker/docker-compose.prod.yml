services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
      args:
        VERSION: ${APP_VERSION:-prod}
    image: banglab2bb2c:prod
    container_name: banglab2bb2c_app
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - banglab2bb2c
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - app-uploads:/app/uploads:rw
      - ./config.toml:/app/config.toml:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:17-alpine
    container_name: banglab2bb2c_db
    restart: unless-stopped
    networks:
      - banglab2bb2c
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: banglab2bb2c_redis
    restart: unless-stopped
    networks:
      - banglab2bb2c
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

  nginx:
    image: nginx:1.27-alpine
    container_name: banglab2bb2c_nginx
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - banglab2bb2c
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    # Reload nginx every 6h so renewed certs are picked up without a restart.
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    container_name: banglab2bb2c_certbot
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Attempt renewal every 12h. Certbot is a no-op until certs are within 30
    # days of expiry, so this is cheap.
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"

networks:
  banglab2bb2c:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  app-uploads:
  certbot-conf:
  certbot-www:
