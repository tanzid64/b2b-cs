services:
  # BANGLAB2BB2C app
  app:
    image: banglab2bb2c/banglab2bb2c:latest
    container_name: banglab2bb2c_app
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - banglab2bb2c
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./uploads:/app/uploads:rw
      - ./config.toml:/app/config.toml:ro
    command: ["server", "-migrate", "-config", "/app/config.toml"]

  # PostgreSQL database
  db:
    image: postgres:17-alpine
    container_name: banglab2bb2c_db
    restart: unless-stopped
    networks:
      - banglab2bb2c
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-banglab2bb2c}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-banglab2bb2c}
      POSTGRES_DB: ${POSTGRES_DB:-banglab2bb2c}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-banglab2bb2c} -d ${POSTGRES_DB:-banglab2bb2c}"]
      interval: 10s
      timeout: 5s
      retries: 6
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    container_name: banglab2bb2c_redis
    restart: unless-stopped
    networks:
      - banglab2bb2c
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

networks:
  banglab2bb2c:

volumes:
  postgres-data:
  redis-data:
