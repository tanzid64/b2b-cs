# Bootstrap vhost for obtaining the first Let's Encrypt certificate.
#
# Usage: rename this file to `support.banglab2bb2c.com.conf` BEFORE the cert
# exists, run the certbot one-shot command in PRODUCTION.md, then swap back to
# the real `support.banglab2bb2c.com.conf` and `docker compose exec nginx
# nginx -s reload`.
#
# Why this exists: the real vhost references /etc/letsencrypt/live/.../fullchain.pem
# which does not exist before the first issuance, and nginx will refuse to start.

server {
    listen 80;
    listen [::]:80;
    server_name support.banglab2bb2c.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 404;
    }
}
