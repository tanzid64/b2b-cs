# support.banglab2bb2c.com — production vhost

# Map for WebSocket upgrade header.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP: serve ACME challenges, redirect everything else to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name support.banglab2bb2c.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name support.banglab2bb2c.com;

    ssl_certificate     /etc/letsencrypt/live/support.banglab2bb2c.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/support.banglab2bb2c.com/privkey.pem;

    # Modern TLS only.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:8080;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / SSE
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Long-lived chat streams.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
